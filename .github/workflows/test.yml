name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run unit, integration, and smoke tests
        shell: bash
        run: |
          mapfile -t files < <(find tests -type f -name '*.test.js' | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No test files found"
            exit 1
          fi
          node --test "${files[@]}"